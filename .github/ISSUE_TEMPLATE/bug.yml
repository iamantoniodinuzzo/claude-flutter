name: Bug Report
description: Report a reproducible bug or unexpected behavior
labels: ["bug"]
assignees: ["iamantoniodinuzzo"]
body:
  - type: markdown
    attributes:
      value: |
        Fill in as much detail as possible. Issues with no reproduction steps may be closed.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `...`
        2. Observe `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Flutter version:
        - Claude Code version:
        - Branch/commit:
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Logs, screenshots, related issues.
    validations:
      required: false
