name: Feature Request
description: Propose a new feature or enhancement
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see added.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-paragraph description of the feature.
      placeholder: As a user, I want...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: How should it work? Include API/UI sketches if useful.
    validations:
      required: false

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: Bullet list of conditions that must be true for this to be done.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Screenshots, links, related issues.
    validations:
      required: false
