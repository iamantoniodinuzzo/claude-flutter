name: Create GitHub Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG section for this version
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.tag.outputs.version }}"

          # Extract the block between ## [VERSION] and the next ## [
          BODY="$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)"

          if [ -z "$BODY" ]; then
            BODY="Release ${VERSION}. See CHANGELOG.md for details."
          fi

          # Write to file to preserve newlines
          printf '%s' "$BODY" > /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "flutter-toolkit ${{ github.ref_name }}" \
            --notes-file "${{ steps.changelog.outputs.notes_file }}" \
            --verify-tag
